# Infra de desenvolvimento do SGC Angola (M1).
# Sobe: PostgreSQL, Keycloak, Redis, MinIO, Prometheus, Grafana e a API.
# Orthanc (PACS) fica preparado/comentado para M3 (ADR-016).

name: sgc

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sgc
      POSTGRES_PASSWORD: sgc
      POSTGRES_DB: sgc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgc -d sgc"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: sgc-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # UI + API (http://localhost:8025)

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8081:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    # Nota: a imagem 25 (ubi-micro) não traz shell/curl, pelo que não se define
    # healthcheck de container. A prontidão do Keycloak é validada pelo /readyz
    # da API (verificação de JWKS) a partir de M1/Sprint 2.

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: sgc
      MINIO_ROOT_PASSWORD: sgc-secreto
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # Cria o bucket "documentos" e termina (job de arranque).
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 sgc sgc-secreto; do sleep 2; done;
      mc mb --ignore-existing local/documentos;
      exit 0;
      "

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

  api:
    build: .
    environment:
      APP_ENV: dev
      HTTP_PORT: "8080"
      LOG_LEVEL: info
      DATABASE_URL: postgres://sgc:sgc@postgres:5432/sgc?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/sgc
      KEYCLOAK_AUDIENCE: sgc-api
      KEYCLOAK_ADMIN_CLIENT_ID: sgc-admin
      KEYCLOAK_ADMIN_CLIENT_SECRET: segredo-admin
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: nao-responder@sgc.ao
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/api", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # PACS — preparado para M3 (ADR-016). DICOM nunca na BD.
  # orthanc:
  #   image: orthancteam/orthanc:latest
  #   ports:
  #     - "8042:8042"
  #     - "4242:4242"

volumes:
  pgdata:
  miniodata:
  grafanadata:
